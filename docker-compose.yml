version: '3.8'

services:
  kvideo:
    container_name: kvideo
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3000"       # 映射到宿主机 3001
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # 数据持久化（可选，取消注释即可使用）
      # - ./data:/app/data
      # - ./logs:/app/logs
    networks:
      - kvideo-network

networks:
  kvideo-network:
    driver: bridge
